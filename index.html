<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Color Temperature</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: manrope;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  #slider {
    width: min(88vw, 420px);
    appearance: none;
    -webkit-appearance: none;
    height: 44px;
    background: transparent;
    touch-action: pan-x;
    cursor: pointer;
  }

  #slider::-webkit-slider-runnable-track {
    height: 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.3);
    border: 1px solid rgba(0, 0, 0, 0.15);
  }

  #slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 32px;
    height: 32px;
    margin-top: -10px;
    border: 0;
    border-radius: 50%;
    background: #111;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
  }

  #slider::-moz-range-track {
    height: 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.3);
    border: 1px solid rgba(0, 0, 0, 0.15);
  }

  #slider::-moz-range-thumb {
    width: 32px;
    height: 32px;
    border: 0;
    border-radius: 50%;
    background: #111;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
  }

  @media (max-width: 640px) {
    #slider {
      order: 4;
      margin-top: 18px;
      width: min(92vw, 520px);
      height: 52px;
    }

    #slider::-webkit-slider-runnable-track,
    #slider::-moz-range-track {
      height: 18px;
    }

    #slider::-webkit-slider-thumb,
    #slider::-moz-range-thumb {
      width: 38px;
      height: 38px;
    }

    #slider::-webkit-slider-thumb {
      margin-top: -10px;
    }
  }

  #value {
    margin-top: 0px;
    font-size: 20px;
  }

  #value:focus,
  #value[contenteditable="plaintext-only"],
  #color-codes code:focus,
  #color-codes code[contenteditable="plaintext-only"] {
    outline: none;
    border: 0;
    box-shadow: none;
  }

  #color-codes {
    margin-top: 12px;
    display: grid;
    gap: 6px;
    justify-items: center;
    font-size: 14px;
    font-family: manrope;
  }

  #color-codes code {
    padding: 6px 10px;
    border-radius: 30px;
    background: rgba(0, 0, 0, 0.308);
    color: rgba(255, 255, 255, 0.5);
    font-weight: 500;
    font-size: 14px;
    font-family: manrope;
  }

  .hidden,
  #app.hidden {
    display: none;
  }

  #hint {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.75;
    user-select: none;
  }

  h1 {
    margin: 0
  }

  @media (max-width: 480px) {
    #hint {
      display: none;
    }
    h1 {
      margin-bottom: 10px;
    }
  }
</style>

<body>
  <div id="app">
    <h1>Choose Color Temperature</h1>
    <input type="range" min="1000" max="10000" value="3000" id="slider">
    <div id='value'></div>
    <div id="color-codes">
      <code id="hex-value"></code>
    </div>
    <div id="hint">Space: blackout · U: toggle UI <br> ← →: adjust </div>
  </div>
</body>
<script>
  const app = document.getElementById("app")
  const slider = document.getElementById("slider")
  const valueEl = document.getElementById("value")
  const hexValueEl = document.getElementById("hex-value")
  const editableFields = [valueEl, hexValueEl]
  let activeEditableField = null

  valueEl.tabIndex = 0
  hexValueEl.tabIndex = 0
  valueEl.setAttribute("role", "textbox")
  hexValueEl.setAttribute("role", "textbox")
  valueEl.setAttribute("aria-label", "Temperature in kelvin")
  hexValueEl.setAttribute("aria-label", "Hex color value")

  function kelvinToRGB(k) {

    let temp = k / 100
    let r, g, b

    if (temp <= 66) {
      r = 255
      g = temp
      g = 99.47 * Math.log(g) - 161.12
      b = temp <= 19 ? 0 : 138.52 * Math.log(temp - 10) - 305.04
    } else {
      r = 329.7 * Math.pow(temp - 60, -0.133)
      g = 288.12 * Math.pow(temp - 60, -0.0755)
      b = 255
    }

    r = Math.min(255, Math.max(0, r))
    g = Math.min(255, Math.max(0, g))
    b = Math.min(255, Math.max(0, b))

    return {
      r: Math.round(r),
      g: Math.round(g),
      b: Math.round(b),
    }
  }

  function rgbToHex({ r, g, b }) {
    return "#" + [r, g, b]
      .map((value) => value.toString(16).padStart(2, "0"))
      .join("")
      .toUpperCase()
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value))
  }

  function isEditableTarget(target) {
    return target instanceof HTMLElement && target.isContentEditable
  }

  function parseTemperatureInput(value) {
    const normalized = value.replace(/k/gi, "").trim()
    const nextTemperature = Number(normalized)

    return Number.isFinite(nextTemperature) ? nextTemperature : Number.NaN
  }

  function parseHexInput(value) {
    const normalized = value.trim().replace(/^#/, "")

    if (!/^[\da-f]{6}$/i.test(normalized)) {
      return null
    }

    return {
      r: Number.parseInt(normalized.slice(0, 2), 16),
      g: Number.parseInt(normalized.slice(2, 4), 16),
      b: Number.parseInt(normalized.slice(4, 6), 16),
    }
  }

  function findNearestTemperatureForRgb(targetRgb) {
    const min = Number(slider.min)
    const max = Number(slider.max)
    let closestTemperature = min
    let smallestDistance = Number.POSITIVE_INFINITY

    for (let temperature = min; temperature <= max; temperature += 1) {
      const rgb = kelvinToRGB(temperature)
      const distance = (
        (rgb.r - targetRgb.r) ** 2 +
        (rgb.g - targetRgb.g) ** 2 +
        (rgb.b - targetRgb.b) ** 2
      )

      if (distance < smallestDistance) {
        smallestDistance = distance
        closestTemperature = temperature
      }
    }

    return closestTemperature
  }

  function focusEditableField(field) {
    activeEditableField = field
    field.dataset.previousValue = field.textContent ?? ""
    field.contentEditable = "plaintext-only"

    const selection = window.getSelection()
    const range = document.createRange()

    range.selectNodeContents(field)
    selection?.removeAllRanges()
    selection?.addRange(range)
  }

  function stopEditingField(field, { commit = true } = {}) {
    if (!field.isContentEditable) {
      return
    }

    const rawValue = field.textContent ?? ""
    field.contentEditable = "false"
    activeEditableField = null

    if (!commit) {
      update()
      return
    }

    if (field === valueEl) {
      const nextTemperature = parseTemperatureInput(rawValue)

      if (Number.isFinite(nextTemperature)) {
        slider.value = clamp(
          Math.round(nextTemperature),
          Number(slider.min),
          Number(slider.max),
        ).toString()
      }

      update()
      return
    }

    if (field === hexValueEl) {
      const rgb = parseHexInput(rawValue)

      if (rgb) {
        slider.value = findNearestTemperatureForRgb(rgb).toString()
      }

      update()
    }
  }

  function update() {
    const k = slider.value
    const rgb = kelvinToRGB(k)
    const rgbString = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`

    document.body.style.background = rgbString
    valueEl.textContent = k + "K"
    hexValueEl.textContent = rgbToHex(rgb)
  }

  slider.addEventListener("input", update)
  update()

  editableFields.forEach((field) => {
    field.addEventListener("click", () => {
      if (field.isContentEditable) {
        return
      }

      focusEditableField(field)
    })

    field.addEventListener("focus", () => {
      if (field.isContentEditable) {
        return
      }

      focusEditableField(field)
    })

    field.addEventListener("blur", () => {
      stopEditingField(field)
    })

    field.addEventListener("keydown", (event) => {
      if (event.code === "Enter") {
        event.preventDefault()
        stopEditingField(field)
        field.blur()
        return
      }

      if (event.code === "Escape") {
        event.preventDefault()
        stopEditingField(field, { commit: false })
        field.blur()
      }
    })

    field.addEventListener("paste", (event) => {
      const pastedText = event.clipboardData?.getData("text/plain")

      if (!pastedText) {
        return
      }

      event.preventDefault()
      field.textContent = pastedText.trim()
    })
  })

  let black = false

  function toggleBlackout() {
    black = !black

    if (black) {
      document.body.style.background = "black"
      slider.classList.add("hidden")
      hexValueEl.classList.add("hidden")
      return
    }

    slider.classList.remove("hidden")
    hexValueEl.classList.remove("hidden")
    update()
  }

  document.addEventListener("keydown", (event) => {
    if (isEditableTarget(event.target)) {
      return
    }

    if (black) {
      event.preventDefault()
      toggleBlackout()
      return
    }

    if (event.code === "ArrowLeft" || event.code === "ArrowRight") {
      event.preventDefault()

      const direction = event.code === "ArrowRight" ? 100 : -100
      const nextValue = Number(slider.value) + direction
      const min = Number(slider.min)
      const max = Number(slider.max)

      slider.value = Math.min(max, Math.max(min, nextValue))

      if (!black) {
        update()
      }

      return
    }

    if (event.code === "Space") {
      event.preventDefault()
      toggleBlackout()
    }

    if (event.code === "KeyU") {
      event.preventDefault()
      app.classList.toggle("hidden")
    }
  })

  document.addEventListener("pointerdown", (event) => {
    if (!black || event.pointerType !== "mouse") {
      return
    }

    event.preventDefault()
    toggleBlackout()
  })
</script>

</html>
